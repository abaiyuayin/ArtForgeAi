<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArtForgeAI</title>
  <script>
    // GitHub Pages SPA fallback for Vue Router history mode
    const segment = '/ArtForgeAi';
    const path = window.location.pathname;
    const search = window.location.search;
    const hash = window.location.hash;
    if (path.indexOf(segment) === 0) {
      const remaining = path.slice(segment.length) || '/';
      const redirect = segment + '/?redirect=' + encodeURIComponent(remaining + search + hash);
      window.location.replace(redirect);
    } else {
      window.location.replace(segment + '/');
    }
  </script>
</head>
<body>
  <p>正在跳转…</p>
</body>
</html>
